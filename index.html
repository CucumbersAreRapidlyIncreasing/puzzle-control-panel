<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="制御盤">
  <meta name="theme-color" content="#e8e5dc">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <title>システム制御盤</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      --panel: #e8e5dc;
      --ink: #222;
      --metal-dark: #323232;
      --metal-light: #a9a9a6;
      --red: #ed2224;
      --blue: #173de8;
      --yellow: #ecf500;
      --pink: #e78b96;
      --black: #111;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #171717;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      min-height: 100svh;
      -webkit-tap-highlight-color: transparent;
    }

    button { font: inherit; }

    .app {
      position: relative;
      width: min(100vw, 1024px);
      min-height: 100svh;
      padding: max(34px, env(safe-area-inset-top)) 4.5% max(38px, env(safe-area-inset-bottom));
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.85), transparent 40%),
        repeating-linear-gradient(90deg, rgba(0,0,0,.018) 0 1px, transparent 1px 5px),
        var(--panel);
      box-shadow: 0 0 50px #000;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .topbar {
      height: clamp(68px, 9vw, 94px);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: clamp(18px, 4vw, 45px);
    }

    .title-block small {
      display: block;
      margin-bottom: 4px;
      font-size: clamp(10px, 1.5vw, 15px);
      font-weight: 800;
      letter-spacing: .22em;
      color: #70706d;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 42px);
      line-height: 1;
      letter-spacing: .12em;
    }

    .reset {
      min-width: clamp(104px, 17vw, 170px);
      padding: .55em .8em;
      border: 3px solid var(--ink);
      border-radius: 5px;
      color: var(--ink);
      background: rgba(255,255,255,.45);
      font-size: clamp(17px, 2.8vw, 30px);
      font-weight: 900;
      box-shadow: 4px 4px 0 var(--ink);
      touch-action: manipulation;
    }

    .reset:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 var(--ink); }

    section { margin-top: clamp(28px, 5.8vw, 62px); }

    .section-title {
      width: fit-content;
      min-width: clamp(170px, 30vw, 290px);
      margin: 0 auto clamp(18px, 3.5vw, 38px);
      padding: .18em 1em .23em;
      color: white;
      background: var(--metal-dark);
      text-align: center;
      font-size: clamp(22px, 4vw, 43px);
      line-height: 1.15;
      letter-spacing: .08em;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.12);
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: start;
      gap: clamp(5px, 2vw, 24px);
    }

    .control {
      min-width: 0;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      text-align: center;
      touch-action: none;
      cursor: pointer;
    }

    .control svg { width: 100%; height: auto; display: block; overflow: visible; }

    .label {
      display: block;
      margin-top: clamp(3px, 1vw, 10px);
      font-size: clamp(18px, 3.4vw, 37px);
      font-weight: 900;
      line-height: 1;
      color: white;
      -webkit-text-stroke: clamp(1px, .22vw, 2.5px) var(--ink);
      paint-order: stroke fill;
    }

    /* Lever SVG state */
    .lever .handle { transition: transform .18s ease; }
    .lever[aria-pressed="true"] .handle { transform: translateY(62px); }
    .lever .lamp-off, .lever .lamp-on { transition: opacity .15s ease; }
    .lever .lamp-on { opacity: 0; }
    .lever[aria-pressed="true"] .lamp-off { opacity: 0; }
    .lever[aria-pressed="true"] .lamp-on { opacity: 1; }

    /* Button SVG state */
    .push-button .cap { transition: transform .07s ease, filter .07s ease; transform-origin: 50px 54px; }
    .push-button.is-down .cap { transform: translateY(8px) scale(.95); filter: brightness(.78); }
    .push-button.is-down .shine { opacity: .25; }

    .dial-wrap { position: relative; }
    .dial .rotor { transform-origin: 60px 66px; transition: transform .22s cubic-bezier(.2,.8,.3,1); }
    .dial .value-readout {
      margin-top: 3px;
      font-size: clamp(12px, 1.6vw, 17px);
      font-weight: 800;
      color: #686863;
      letter-spacing: .12em;
    }

    .dial-label {
      display: block;
      margin-top: 0;
      font-family: Arial, sans-serif;
      font-size: clamp(26px, 4.5vw, 48px);
      line-height: .9;
      color: white;
      -webkit-text-stroke: clamp(1px, .22vw, 2.5px) var(--ink);
      paint-order: stroke fill;
    }

    .status-line {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: clamp(24px, 5vw, 50px);
      font-size: clamp(10px, 1.4vw, 14px);
      font-weight: 800;
      letter-spacing: .16em;
      color: #6d6d68;
    }

    .status-dot {
      display: inline-block;
      width: .9em;
      height: .9em;
      margin-right: .45em;
      border: 2px solid #555;
      border-radius: 50%;
      background: #aaa;
      vertical-align: -.08em;
    }

    .modal-backdrop {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .modal-backdrop.open { opacity: 1; pointer-events: auto; }

    .modal {
      width: min(86vw, 520px);
      padding: clamp(26px, 5vw, 46px);
      border: 4px solid #222;
      border-radius: 8px;
      background: #f4f1e8;
      text-align: center;
      box-shadow: 12px 12px 0 rgba(0,0,0,.35);
      transform: scale(.92);
      transition: transform .18s ease;
    }

    .modal-backdrop.open .modal { transform: scale(1); }
    .modal-icon { width: 58px; height: 58px; margin: 0 auto 18px; }
    .modal-message { margin: 0 0 25px; font-size: clamp(20px, 3.5vw, 32px); font-weight: 900; line-height: 1.5; }
    .modal-close { padding: .55em 2.2em; border: 0; border-radius: 4px; color: white; background: #292929; font-weight: 900; font-size: 18px; }

    @media (max-width: 560px) {
      .app { padding-left: 3%; padding-right: 3%; }
      .control-grid { gap: 2px; }
      section { margin-top: 31px; }
      .section-title { margin-bottom: 14px; }
    }

    @media (orientation: landscape) and (max-height: 800px) {
      .app { width: 100%; max-width: none; padding-top: 18px; }
      .topbar { height: 48px; margin-bottom: 0; }
      section { margin-top: 18px; }
      .section-title { margin-bottom: 8px; font-size: 24px; }
      .control-grid { width: min(900px, 92vw); margin: auto; }
      .control svg { max-height: 118px; }
      .dial .control-svg { max-height: 130px; }
      .label { font-size: 24px; }
      .status-line { margin-top: 16px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <small>EMERGENCY CONTROL UNIT</small>
        <h1>システム制御盤</h1>
      </div>
      <button class="reset" id="resetButton" type="button">リセット</button>
    </header>

    <section aria-labelledby="leverTitle">
      <h2 class="section-title" id="leverTitle">レバー</h2>
      <div class="control-grid" id="levers"></div>
    </section>

    <section aria-labelledby="buttonTitle">
      <h2 class="section-title" id="buttonTitle">ボタン</h2>
      <div class="control-grid" id="buttons"></div>
    </section>

    <section aria-labelledby="dialTitle">
      <h2 class="section-title" id="dialTitle">ダイヤル</h2>
      <div class="control-grid" id="dials"></div>
    </section>

    <div class="status-line" aria-hidden="true">
      <span><i class="status-dot"></i>LOCAL MODE</span>
      <span>UNIT 05</span>
    </div>
  </main>

  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalMessage">
    <div class="modal">
      <svg class="modal-icon" viewBox="0 0 60 60" aria-hidden="true">
        <circle cx="30" cy="30" r="27" fill="#333"/>
        <path d="M17 31l8 8 18-20" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="modal-message" id="modalMessage"></p>
      <button class="modal-close" id="modalClose" type="button">閉じる</button>
    </div>
  </div>

  <script>
    const colors = [
      { id: 'red', label: '赤', value: '#ed2224' },
      { id: 'blue', label: '青', value: '#173de8' },
      { id: 'yellow', label: '黄', value: '#ecf500' },
      { id: 'pink', label: '桃', value: '#e78b96' },
      { id: 'black', label: '黒', value: '#111111' }
    ];

    const dialLetters = ['A', 'B', 'C', 'D', 'E'];
    const targetDials = [2, 3, 4, 1, 5];
    const dialValues = [1, 1, 1, 1, 1];
    const dialTurns = [0, 0, 0, 0, 0];
    const activeButtons = new Map();
    const leverTargetSequence = ['yellow', 'black', 'red', 'blue', 'pink'];
    const leverHistory = [];
    let activeLever = null;
    let leverSequenceSolved = false;
    let chordLocked = false;
    let dialSolved = false;

    const leverSvg = color => `
      <svg class="control-svg" viewBox="0 0 100 136" role="img" aria-hidden="true">
        <defs>
          <linearGradient id="rail-${color.id}" x1="0" x2="1">
            <stop offset="0" stop-color="#242424"/><stop offset=".5" stop-color="#4b4b4b"/><stop offset="1" stop-color="#222"/>
          </linearGradient>
          <radialGradient id="lamp-${color.id}">
            <stop offset="0" stop-color="#fff"/><stop offset=".3" stop-color="${color.value}"/><stop offset="1" stop-color="${color.value}"/>
          </radialGradient>
        </defs>
        <rect x="13" y="18" width="18" height="91" rx="9" fill="url(#rail-${color.id})"/>
        <rect x="69" y="18" width="18" height="91" rx="9" fill="url(#rail-${color.id})"/>
        <g class="handle">
          <rect x="20" y="27" width="60" height="14" rx="2" fill="${color.value}" stroke="#202020" stroke-width="1.5"/>
          <path d="M23 29h54" stroke="#fff" stroke-opacity=".45" stroke-width="2"/>
        </g>
        <circle class="lamp-off" cx="50" cy="119" r="7" fill="#6d6d69" stroke="#171717" stroke-width="2"/>
        <circle class="lamp-on" cx="50" cy="119" r="8" fill="url(#lamp-${color.id})" stroke="#fff" stroke-width="2"/>
      </svg>`;

    const buttonSvg = color => `
      <svg class="control-svg" viewBox="0 0 100 105" role="img" aria-hidden="true">
        <ellipse cx="50" cy="73" rx="38" ry="25" fill="#050505"/>
        <path d="M13 58v14c0 16 17 28 37 28s37-12 37-28V58z" fill="${color.value}" stroke="#111" stroke-width="2" filter="brightness(.68)"/>
        <g class="cap">
          <ellipse cx="50" cy="55" rx="38" ry="31" fill="${color.value}" stroke="#111" stroke-width="2"/>
          <ellipse cx="50" cy="54" rx="25" ry="21" fill="${color.value}" stroke="#eee" stroke-width="2" filter="brightness(.9)"/>
          <path class="shine" d="M27 41c8-13 30-18 46-7" fill="none" stroke="#fff" stroke-opacity=".42" stroke-width="4" stroke-linecap="round"/>
        </g>
      </svg>`;

    const dialSvg = index => {
      const numbers = Array.from({ length: 6 }, (_, i) => {
        const angle = i * 60;
        return `<g transform="rotate(${angle} 60 66)"><text x="60" y="39" text-anchor="middle" font-size="13" font-weight="900" fill="#111">${i + 1}</text><path d="M60 42v6" stroke="#222" stroke-width="2"/></g>`;
      }).join('');
      return `
        <svg class="control-svg" viewBox="0 0 120 132" role="img" aria-hidden="true">
          <defs>
            <radialGradient id="dialMetal${index}"><stop offset="0" stop-color="#d8d8d5"/><stop offset=".7" stop-color="#aaa"/><stop offset="1" stop-color="#797976"/></radialGradient>
          </defs>
          <path d="M53 3h14l-7 13z" fill="#111"/>
          <g class="rotor">
            <circle cx="60" cy="66" r="43" fill="url(#dialMetal${index})" stroke="#222" stroke-width="2"/>
            ${numbers}
            <circle cx="60" cy="66" r="17" fill="#aaa" stroke="#555" stroke-width="1.5"/>
            <circle cx="55" cy="61" r="7" fill="#fff" opacity=".12"/>
          </g>
          <rect x="43" y="113" width="34" height="17" rx="8" fill="#383836"/>
          <text class="svg-value" x="60" y="126" text-anchor="middle" font-size="12" font-weight="900" fill="#fff">1</text>
        </svg>`;
    };

    function buildControls() {
      const leverHost = document.getElementById('levers');
      const buttonHost = document.getElementById('buttons');
      const dialHost = document.getElementById('dials');

      colors.forEach(color => {
        const lever = document.createElement('button');
        lever.className = 'control lever';
        lever.type = 'button';
        lever.dataset.color = color.id;
        lever.setAttribute('aria-label', `${color.label}のレバー：OFF`);
        lever.setAttribute('aria-pressed', 'false');
        lever.innerHTML = leverSvg(color) + `<span class="label">${color.label}</span>`;
        lever.addEventListener('click', () => toggleLever(lever));
        leverHost.appendChild(lever);

        const button = document.createElement('button');
        button.className = 'control push-button';
        button.type = 'button';
        button.dataset.color = color.id;
        button.setAttribute('aria-label', `${color.label}のボタン`);
        button.innerHTML = buttonSvg(color) + `<span class="label">${color.label}</span>`;
        button.addEventListener('pointerdown', pressButton);
        button.addEventListener('pointerup', releaseButton);
        button.addEventListener('pointercancel', releaseButton);
        button.addEventListener('lostpointercapture', releaseButton);
        buttonHost.appendChild(button);
      });

      dialLetters.forEach((letter, index) => {
        const dial = document.createElement('button');
        dial.className = 'control dial';
        dial.type = 'button';
        dial.dataset.index = index;
        dial.setAttribute('aria-label', `ダイヤル${letter}：1`);
        dial.innerHTML = dialSvg(index) + `<span class="dial-label">${letter}</span>`;
        dial.addEventListener('click', () => turnDial(dial, index));
        dialHost.appendChild(dial);
      });
    }

    function toggleLever(selected) {
      const selectedColor = selected.dataset.color;
      const turningOn = activeLever !== selectedColor;
      document.querySelectorAll('.lever').forEach(lever => {
        const shouldBeOn = lever === selected && turningOn;
        lever.setAttribute('aria-pressed', String(shouldBeOn));
        const color = colors.find(item => item.id === lever.dataset.color);
        lever.setAttribute('aria-label', `${color.label}のレバー：${shouldBeOn ? 'ON' : 'OFF'}`);
      });
      activeLever = turningOn ? selectedColor : null;

      if (turningOn && !leverSequenceSolved) {
        leverHistory.push(selectedColor);

        if (leverHistory.length === leverTargetSequence.length) {
          const matches = leverHistory.every((color, index) => color === leverTargetSequence[index]);
          if (matches) {
            leverSequenceSolved = true;
            showModal('これで起動できそうだ', true);
            resetLevers();
          } else {
            showModal('何かが違うようだ', false);
            resetLevers();
          }
        }
      }
    }

    function resetLevers() {
      activeLever = null;
      leverSequenceSolved = false;
      leverHistory.length = 0;
      document.querySelectorAll('.lever').forEach(lever => {
        lever.setAttribute('aria-pressed', 'false');
        const color = colors.find(item => item.id === lever.dataset.color);
        lever.setAttribute('aria-label', `${color.label}のレバー：OFF`);
      });
    }

    function pressButton(event) {
      event.preventDefault();
      const button = event.currentTarget;
      button.setPointerCapture(event.pointerId);
      activeButtons.set(event.pointerId, button.dataset.color);
      button.classList.add('is-down');

      const held = new Set(activeButtons.values());
      if (held.size >= 2 && !chordLocked) {
        chordLocked = true;
        const exactSuccess = held.size === 2 && held.has('yellow') && held.has('pink');
        showModal(exactSuccess ? 'システム起動に成功しました' : '何かが違うようだ', exactSuccess);
      }
    }

    function releaseButton(event) {
      const button = event.currentTarget;
      activeButtons.delete(event.pointerId);
      if (![...activeButtons.values()].includes(button.dataset.color)) button.classList.remove('is-down');
      if (new Set(activeButtons.values()).size < 2) chordLocked = false;
    }

    function turnDial(dial, index) {
      dialValues[index] = dialValues[index] % 6 + 1;
      dialTurns[index] += 1;
      const rotation = dialTurns[index] * -60;
      dial.querySelector('.rotor').style.transform = `rotate(${rotation}deg)`;
      dial.querySelector('.svg-value').textContent = dialValues[index];
      dial.setAttribute('aria-label', `ダイヤル${dialLetters[index]}：${dialValues[index]}`);

      const solved = dialValues.every((value, i) => value === targetDials[i]);
      if (solved && !dialSolved) showModal('システムが復旧しました', true);
      dialSolved = solved;
    }

    function showModal(message, success) {
      const modal = document.getElementById('modal');
      const icon = modal.querySelector('.modal-icon');
      document.getElementById('modalMessage').textContent = message;
      icon.style.filter = success ? 'none' : 'grayscale(1) opacity(.7)';
      modal.classList.add('open');
      document.getElementById('modalClose').focus({ preventScroll: true });
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function resetAll() {
      resetLevers();
      chordLocked = false;
      dialSolved = false;
      activeButtons.clear();
      document.querySelectorAll('.push-button').forEach(button => button.classList.remove('is-down'));
      document.querySelectorAll('.dial').forEach((dial, index) => {
        dialValues[index] = 1;
        dialTurns[index] = 0;
        dial.querySelector('.rotor').style.transform = 'rotate(0deg)';
        dial.querySelector('.svg-value').textContent = '1';
        dial.setAttribute('aria-label', `ダイヤル${dialLetters[index]}：1`);
      });
      closeModal();
    }

    buildControls();
    document.getElementById('resetButton').addEventListener('click', resetAll);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', event => {
      if (event.target.id === 'modal') closeModal();
    });

    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(error => {
          console.warn('Service Worker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
